<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Big Boy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/product_code.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background: #eef1f7;
        }

        .content-area {
            flex: 1;
            padding: 32px 24px 40px;
            max-width: 1500px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 중앙의 인사 텍스트 스타일 (요청: 크기 200) */
        .greeting {
            font-size: 200px;
            line-height: 1;
            font-weight: 700;
            color: #1a237e;
            text-align: center;
            word-break: keep-all;
        }

        @media (max-width: 1200px) {
            .greeting {
                font-size: 120px;
            }
        }

        @media (max-width: 600px) {
            .greeting {
                font-size: 64px;
                padding: 0 16px;
            }
        }
    </style>
</head>
<body>
    <nav class="main-nav">{% include 'nav.html' %}</nav>

    <main class="content-area">
        <div class="greeting">สวัสดีครับ 안녕하세요</div>
    </main>

    <footer><p style="text-align:center;color:#9ca3af;font-size:0.85rem;padding:16px 0;">&copy; 2025 BROTHER MIS SYSTEM. All rights reserved.</p></footer>

</body>
</html>
