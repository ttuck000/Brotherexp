{% extends "base.html" %}
{% block content %}
<div class="container-fluid mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-11">
            <h2 class="mb-4" style="font-weight:700;color:#2a4365;"><i class="fas fa-edit me-2"></i>재고실사 수정</h2>
            <div class="card shadow-sm mb-4 rounded-4">
                <div class="card-body bg-light rounded-4">
                    <form id="auditForm">
                        <input type="hidden" id="auditId" name="auditId">
                        <div class="row g-3 mb-2 align-items-end">
                            <div class="col-md-3">
                                <label for="auditDate" class="form-label">실사일자</label>
                                <input type="date" class="form-control" id="auditDate" name="auditDate" required>
                            </div>
                            <div class="col-md-3">
                                <label for="warehouseCode" class="form-label">창고</label>
                                <select class="form-select" id="warehouseCode" name="warehouseCode" required>
                                    <option value="">선택</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="remarks" class="form-label">비고</label>
                                <input type="text" class="form-control" id="remarks" name="remarks">
                            </div>
                        </div>
                        <div class="card mt-3 shadow rounded-4">
                            <div class="card-header bg-primary text-white rounded-top-4"><i class="fas fa-boxes-stacked me-1"></i>실사 품목 목록</div>
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-bordered table-hover align-middle mb-0 rounded-4 overflow-hidden audit-edit-table" id="itemTable">
                                        <thead class="table-primary">
                                            <tr>
                                                <th>순번</th>
                                                <th>품목코드</th>
                                                <th>품목명</th>
                                                <th>규격</th>
                                                <th>단위</th>
                                                <th>시스템재고</th>
                                                <th>실사수량</th>
                                                <th>차이수량</th>
                                                <th>비고</th>
                                                <th>삭제</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <!-- JS로 행 추가 -->
                                        </tbody>
                                    </table>
                                </div>
                                <div class="mt-3">
                                    <button type="button" class="btn btn-primary px-4" id="addItemBtn"><i class="fas fa-plus me-1"></i>품목추가</button>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4 text-center">
                            <button type="submit" class="btn btn-success px-5 me-2"><i class="fas fa-check me-1"></i>수정 저장</button>
                            <a href="/inventory/inventory_audit_list" class="btn btn-secondary px-5"><i class="fas fa-list me-1"></i>목록</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
let auditId = null;

function formatNumber(num) {
    if (typeof num !== 'number' || isNaN(num)) return '0.00';
    return num.toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function addInputListenersToRow(tr) {
    const countedQtyInput = tr.querySelector('input[name="countedQty[]"]');
    if (countedQtyInput) {
        countedQtyInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^\d.]/g, '');
        });
        countedQtyInput.addEventListener('blur', function() {
            const num = parseFloat(this.value.replace(/,/g, ''));
            this.value = (!isNaN(num)) ? formatNumber(num) : '0.00';
            updateDiffQty(this);
        });
    }
    // 품목코드 선택시 상세정보 자동입력 (창고 미선택시 경고)
    const itemCodeSelect = tr.querySelector('.item-code');
    if (itemCodeSelect) {
        itemCodeSelect.addEventListener('change', function() {
            const code = this.value;
            const warehouseCode = document.getElementById('warehouseCode').value;
            if (!warehouseCode) {
                alert('창고를 먼저 선택하세요.');
                this.value = '';
                return;
            }
            if (!code) {
                tr.querySelector('input[name="itemName[]"]').value = '';
                tr.querySelector('input[name="spec[]"]').value = '';
                tr.querySelector('input[name="unit[]"]').value = '';
                tr.querySelector('input[name="systemQty[]"]').value = '';
                return;
            }
            fetch(`/api/inventory/item/detail/${code}?warehouse_code=${warehouseCode}`)
                .then(res => res.json())
                .then(data => {
                    tr.querySelector('input[name="itemName[]"]').value = data.item_name || '';
                    tr.querySelector('input[name="spec[]"]').value = data.item_spec || '';
                    tr.querySelector('input[name="unit[]"]').value = data.item_unit || '';
                    tr.querySelector('input[name="systemQty[]"]').value = formatNumber(data.system_stock || 0);
                    updateDiffQty(countedQtyInput);
                });
        });
    }
}

function addItemRow() {
    const tbody = document.querySelector('#itemTable tbody');
    const rowCount = tbody.rows.length + 1;
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td class="seq-no">${rowCount}</td>
        <td>
            <select class="form-select item-code" name="itemCode[]" required>
                <option value="">선택</option>
            </select>
        </td>
        <td><input type="text" class="form-control" name="itemName[]" readonly required></td>
        <td><input type="text" class="form-control" name="spec[]" readonly></td>
        <td><input type="text" class="form-control" name="unit[]" readonly></td>
        <td><input type="number" class="form-control" name="systemQty[]" step="0.01" readonly></td>
        <td><input type="text" class="form-control" name="countedQty[]" required></td>
        <td><input type="text" class="form-control" name="diffQty[]" readonly></td>
        <td><input type="text" class="form-control" name="rowRemarks[]"></td>
        <td><button type="button" class="btn btn-danger btn-sm delete-btn" onclick="removeItemRow(this)">삭제</button></td>
    `;
    tbody.appendChild(tr);
    loadItemOptions(tr.querySelector('.item-code'));
    addInputListenersToRow(tr);
}

function loadItemOptions(selectElement, selectedValue) {
    fetch('/api/inventory/item/options')
        .then(res => res.json())
        .then(data => {
            selectElement.innerHTML = '<option value="">선택</option>';
            data.forEach(item => {
                const option = document.createElement('option');
                option.value = item.item_code;
                option.textContent = `${item.item_code} - ${item.item_name}`;
                selectElement.appendChild(option);
            });
            if (selectedValue) {
                // 옵션이 모두 추가된 후에 값 할당
                selectElement.value = selectedValue;
                // 값이 없으면 강제로 트리거 (옵션이 비동기라면)
                if (selectElement.value !== selectedValue) {
                    setTimeout(() => { selectElement.value = selectedValue; }, 100);
                }
            }
        });
}

function removeItemRow(btn) {
    const tr = btn.closest('tr');
    tr.remove();
    document.querySelectorAll('#itemTable .seq-no').forEach((td, idx) => td.textContent = idx + 1);
}

function updateDiffQty(input) {
    const tr = input.closest('tr');
    const systemQty = parseFloat(tr.querySelector('input[name="systemQty[]"]').value.replace(/,/g, '')) || 0;
    const countedQty = parseFloat(input.value.replace(/,/g, '')) || 0;
    tr.querySelector('input[name="diffQty[]"]').value = formatNumber(countedQty - systemQty);
}

function loadAuditData() {
    const urlParams = new URLSearchParams(window.location.search);
    auditId = urlParams.get('id');
    if (!auditId) {
        alert('실사 ID가 없습니다.');
        window.location.href = '/inventory/inventory_audit_list';
        return;
    }
    document.getElementById('auditId').value = auditId;
    fetch(`/api/inventory/audit/edit/${auditId}`)
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                const master = data.master;
                const details = data.details;
                document.getElementById('auditDate').value = master.audit_date;
                document.getElementById('warehouseCode').value = master.warehouse_code;
                document.getElementById('remarks').value = master.remarks || '';
                // 품목 목록 로드
                const tbody = document.querySelector('#itemTable tbody');
                tbody.innerHTML = '';
                details.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="seq-no">${index + 1}</td>
                        <td>
                            <select class="form-select item-code" name="itemCode[]" required>
                                <option value="">선택</option>
                            </select>
                        </td>
                        <td><input type="text" class="form-control" name="itemName[]" readonly required value="${item.item_name || ''}"></td>
                        <td><input type="text" class="form-control" name="spec[]" readonly value="${item.spec || ''}"></td>
                        <td><input type="text" class="form-control" name="unit[]" readonly value="${item.unit || ''}"></td>
                        <td><input type="number" class="form-control" name="systemQty[]" step="0.01" readonly value="${item.system_qty || 0}"></td>
                        <td><input type="text" class="form-control" name="countedQty[]" required value="${formatNumber(item.counted_qty || 0)}"></td>
                        <td><input type="text" class="form-control" name="diffQty[]" readonly value="${formatNumber(item.diff_qty || 0)}"></td>
                        <td><input type="text" class="form-control" name="rowRemarks[]" value="${item.row_remarks || ''}"></td>
                        <td><button type="button" class="btn btn-danger btn-sm delete-btn" onclick="removeItemRow(this)">삭제</button></td>
                    `;
                    tbody.appendChild(tr);
                    const itemCodeSelect = tr.querySelector('.item-code');
                    loadItemOptions(itemCodeSelect, item.item_code);
                    addInputListenersToRow(tr);
                });
                if (master.status === 'Y') {
                    setEditPageDisabled(true);
                }
            } else {
                alert('실사 데이터를 불러올 수 없습니다.');
                window.location.href = '/inventory/inventory_audit_list';
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('데이터 로드 중 오류가 발생했습니다.');
            window.location.href = '/inventory/inventory_audit_list';
        });
}

document.addEventListener('DOMContentLoaded', function() {
    loadWarehouses();
    loadAuditData();
    
    document.getElementById('addItemBtn').addEventListener('click', addItemRow);
    document.getElementById('auditForm').addEventListener('submit', function(e) {
        e.preventDefault();
        updateAudit();
    });
});

function loadWarehouses() {
    fetch('/api/warehouse/options')
        .then(response => response.json())
        .then(data => {
            const select = document.getElementById('warehouseCode');
            select.innerHTML = '<option value="">선택</option>';
            data.sort((a, b) => (a.code || '').localeCompare(b.code || ''));
            data.forEach(wh => {
                const option = document.createElement('option');
                option.value = wh.code;
                option.textContent = `${wh.code} - ${wh.name}`;
                select.appendChild(option);
            });
        })
        .catch(error => {
            console.error('Error:', error);
        });
}

function updateAudit() {
    // 필수값 체크
    const auditDate = document.getElementById('auditDate').value;
    const warehouseCode = document.getElementById('warehouseCode').value;
    if (!auditDate || !warehouseCode) {
        alert('실사일자와 창고를 선택하세요.');
        return;
    }
    
    // 품목 데이터 수집
    const items = [];
    let valid = true;
    document.querySelectorAll('#itemTable tbody tr').forEach(tr => {
        const itemCode = tr.querySelector('.item-code').value;
        const itemName = tr.querySelector('input[name="itemName[]"]').value;
        const spec = tr.querySelector('input[name="spec[]"]').value;
        const unit = tr.querySelector('input[name="unit[]"]').value;
        const systemQty = tr.querySelector('input[name="systemQty[]"]').value.replace(/,/g, '');
        const countedQty = tr.querySelector('input[name="countedQty[]"]').value.replace(/,/g, '');
        const diffQty = tr.querySelector('input[name="diffQty[]"]').value.replace(/,/g, '');
        const rowRemarks = tr.querySelector('input[name="rowRemarks[]"]').value;
        
        if (!itemCode) valid = false;
        items.push({
            itemCode, itemName, spec, unit,
            systemQty, countedQty, diffQty, rowRemarks
        });
    });
    
    if (!valid || items.length === 0) {
        alert('모든 품목의 품목코드를 선택하세요.');
        return;
    }
    
    const remarks = document.getElementById('remarks').value;
    const data = {
        auditId: auditId,
        auditDate,
        warehouseCode,
        remarks,
        items
    };
    
    fetch('/api/inventory/audit/update', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(async res => {
        let result;
        try {
            result = await res.json();
        } catch (e) {
            const text = await res.text();
            alert('서버 응답 오류: ' + text);
            throw new Error('서버 응답 오류: ' + text);
        }
        return result;
    })
    .then(result => {
        if (result && result.success) {
            alert('실사 수정이 완료되었습니다.');
            window.location.href = '/inventory/inventory_audit_list';
        } else {
            alert((result && result.message) || '실사 수정에 실패했습니다.');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('저장 중 오류가 발생했습니다.');
    });
}

function setEditPageDisabled(disabled) {
    // 품목추가 버튼
    document.getElementById('addItemBtn').disabled = disabled;
    // 수정저장 버튼
    document.querySelector('button[type="submit"]')?.setAttribute('disabled', disabled ? 'disabled' : null);
    // 품목행 삭제 버튼
    document.querySelectorAll('.delete-btn').forEach(btn => btn.disabled = disabled);
    // 품목코드 등 입력란
    document.querySelectorAll('#itemTable input, #itemTable select').forEach(el => el.disabled = disabled);
}
</script>
<style>
.audit-edit-table th, .audit-edit-table td { font-size: 0.93rem; padding: 0.28rem 0.35rem; vertical-align: middle; }
.audit-edit-table th { background: #e9f0fa; }
.audit-edit-table .item-code { min-width: 180px; max-width: 220px; width: 200px; font-size: 0.93rem; padding: 0.18rem 0.25rem; }
.audit-edit-table input.form-control, .audit-edit-table select.form-select {
    font-size: 0.93rem; padding: 0.18rem 0.25rem; height: 1.8rem;
}
.audit-edit-table td { background: #fcfdff; }
.audit-edit-table tr { border-bottom: 1px solid #e3e3e3; }
.audit-edit-table .seq-no { width: 38px; text-align: center; }
.audit-edit-table .delete-btn { padding: 0.18rem 0.6rem; font-size: 0.91rem; }
</style>
{% endblock %}
