{% extends "base.html" %}
{% block content %}
<div class="container-fluid mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-11">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0" style="font-weight:700;color:#2a4365;">
                    <i class="fas fa-clipboard-list me-2"></i>재고실사현황 상세
                </h2>
                <div>
                    <a href="/inventory/inventory_audit_list" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-1"></i>목록으로
                    </a>
                </div>
            </div>

            <!-- 실사 기본 정보 -->
            <div class="card shadow-sm mb-4 rounded-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-info-circle me-2"></i>실사 기본 정보</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">실사 ID</label>
                            <p class="form-control-plaintext" id="auditId"></p>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">실사일자</label>
                            <p class="form-control-plaintext" id="auditDate"></p>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">창고</label>
                            <p class="form-control-plaintext" id="warehouseName"></p>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">상태</label>
                            <p class="form-control-plaintext" id="status"></p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">비고</label>
                            <p class="form-control-plaintext" id="remarks"></p>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">등록자</label>
                            <p class="form-control-plaintext" id="createUser"></p>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">등록일시</label>
                            <p class="form-control-plaintext" id="createDate"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 실사 상세 항목 -->
            <div class="card shadow rounded-4">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-list me-2"></i>실사 상세 항목</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover align-middle mb-0 rounded-4 overflow-hidden">
                            <thead class="table-success text-center">
                                <tr>
                                    <th class="text-center">순번</th>
                                    <th class="text-center">품목코드</th>
                                    <th class="text-center">품목명</th>
                                    <th class="text-center">규격</th>
                                    <th class="text-center">단위</th>
                                    <th class="text-center">매입단가</th>
                                    <th class="text-center">매출단가</th>
                                    <th class="text-center">사용여부</th>
                                    <th class="text-center">시스템재고</th>
                                    <th class="text-center">실사재고</th>
                                    <th class="text-center">차이</th>
                                    <th class="text-center">재고가치</th>
                                    <th class="text-center">비고</th>
                                </tr>
                            </thead>
                            <tbody id="auditDetailBody">
                                <!-- JS로 행 추가 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 요약 정보 -->
            <div class="card shadow-sm mt-4 rounded-4">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="fas fa-chart-bar me-2"></i>요약 정보</h5>
                </div>
                <div class="card-body">
                    <div class="row text-center mb-3">
                        <div class="col-md-3">
                            <div class="border rounded p-3">
                                <h4 class="text-primary mb-1" id="totalItems">0</h4>
                                <p class="text-muted mb-0">총 품목 수</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="border rounded p-3">
                                <h4 class="text-success mb-1" id="matchedItems">0</h4>
                                <p class="text-muted mb-0">일치 품목</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="border rounded p-3">
                                <h4 class="text-warning mb-1" id="differentItems">0</h4>
                                <p class="text-muted mb-0">차이 품목</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="border rounded p-3">
                                <h4 class="text-danger mb-1" id="totalDifference">0</h4>
                                <p class="text-muted mb-0">총 차이량</p>
                            </div>
                        </div>
                    </div>
                    <div class="row text-center">
                        <div class="col-md-3">
                            <div class="border rounded p-3">
                                <h4 class="text-info mb-1" id="overStockItems">0</h4>
                                <p class="text-muted mb-0">과잉재고 품목</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="border rounded p-3">
                                <h4 class="text-warning mb-1" id="shortageItems">0</h4>
                                <p class="text-muted mb-0">부족재고 품목</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="border rounded p-3">
                                <h4 class="text-success mb-1" id="accuracyRate">0%</h4>
                                <p class="text-muted mb-0">정확도</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="border rounded p-3">
                                <h4 class="text-secondary mb-1" id="totalValue">0</h4>
                                <p class="text-muted mb-0">총 재고가치</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // URL에서 실사 ID 가져오기
    const urlParams = new URLSearchParams(window.location.search);
    const auditId = urlParams.get('id');
    
    if (!auditId) {
        // 실사 ID가 없으면 목록 표시
        showAuditList();
    } else {
        // 실사 ID가 있으면 상세 정보 표시
        loadAuditDetail(auditId);
    }
});

function showAuditList() {
    // 페이지 제목 변경
    document.querySelector('h2').innerHTML = '<i class="fas fa-clipboard-list me-2"></i>재고실사현황 목록';
    
    // 검색 폼 표시
    const searchForm = `
        <div class="card shadow-sm mb-4 rounded-4">
            <div class="card-body bg-light rounded-4">
                <form class="row g-3 align-items-end" id="searchForm">
                    <div class="col-md-3">
                        <label for="startDate" class="form-label">시작일자</label>
                        <input type="date" class="form-control" id="startDate" name="startDate">
                    </div>
                    <div class="col-md-3">
                        <label for="endDate" class="form-label">종료일자</label>
                        <input type="date" class="form-control" id="endDate" name="endDate">
                    </div>
                    <div class="col-md-3">
                        <label for="searchWarehouse" class="form-label">창고</label>
                        <select class="form-select" id="searchWarehouse" name="searchWarehouse">
                            <option value="">전체</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex gap-2 justify-content-end">
                        <button type="submit" class="btn btn-primary px-4"><i class="fas fa-search me-1"></i>검색</button>
                        <a href="/inventory/inventory_audit_register" class="btn btn-success px-4"><i class="fas fa-plus me-1"></i>실사등록</a>
                    </div>
                </form>
            </div>
        </div>
    `;
    
    // 기존 카드들 숨기고 목록 테이블 표시
    document.querySelectorAll('.card').forEach(card => card.style.display = 'none');
    
    // 목록 테이블 추가
    const listTable = `
        <div class="card shadow rounded-4">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle mb-0 rounded-4 overflow-hidden">
                        <thead class="table-primary text-center">
                            <tr>
                                <th class="text-center">순번</th>
                                <th class="text-center">실사ID</th>
                                <th class="text-center">실사일자</th>
                                <th class="text-center">창고</th>
                                <th class="text-center">비고</th>
                                <th class="text-center">등록자</th>
                                <th class="text-center">등록일시</th>
                                <th class="text-center">상태</th>
                                <th class="text-center">조작</th>
                            </tr>
                        </thead>
                        <tbody id="auditListBody">
                            <!-- JS로 행 추가 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div id="pagination" class="mt-3 text-center"></div>
    `;
    
    // 검색 폼과 목록 테이블을 첫 번째 카드 다음에 삽입
    const firstCard = document.querySelector('.card');
    firstCard.insertAdjacentHTML('afterend', searchForm + listTable);
    
    // 기본 날짜 설정
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const firstDay = `${yyyy}-${mm}-01`;
    const lastDay = new Date(yyyy, today.getMonth() + 1, 0).getDate();
    const lastDayStr = `${yyyy}-${mm}-${String(lastDay).padStart(2, '0')}`;
    document.getElementById('startDate').value = firstDay;
    document.getElementById('endDate').value = lastDayStr;
    
    // 창고 옵션 로드
    loadWarehouses();
    
    // 목록 로드
    loadAuditList();
    
    // 검색 이벤트 리스너 추가
    document.getElementById('searchForm').addEventListener('submit', function(e) {
        e.preventDefault();
        loadAuditList();
    });
}

function loadWarehouses() {
    fetch('/api/warehouse/options')
        .then(response => response.json())
        .then(data => {
            const select = document.getElementById('searchWarehouse');
            select.innerHTML = '<option value="">전체</option>';
            // 창고코드 오름차순 정렬
            data.sort((a, b) => (a.code || '').localeCompare(b.code || ''));
            data.forEach(wh => {
                const option = document.createElement('option');
                option.value = wh.code;
                option.textContent = `${wh.code} - ${wh.name}`;
                select.appendChild(option);
            });
        })
        .catch(error => {
            console.error('Error:', error);
        });
}

let currentPage = 1;
let pageSize = 20;

function loadAuditList() {
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const warehouse = document.getElementById('searchWarehouse').value;
    const params = new URLSearchParams({ startDate, endDate, searchWarehouse: warehouse, page: currentPage, pageSize });
    
    fetch('/api/inventory/audit/list?' + params.toString())
        .then(res => res.json())
        .then(result => {
            const data = result.data || [];
            const totalCount = result.totalCount || 0;
            const tbody = document.getElementById('auditListBody');
            tbody.innerHTML = '';
            
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="row-num text-center">${row.row_num}</td>
                    <td class="text-center">
                        <a href="/inventory/inventory_audit_detail?id=${row.id}" class="text-primary fw-bold" style="text-decoration: none;">
                            ${row.id}
                        </a>
                    </td>
                    <td class="text-center">${row.audit_date}</td>
                    <td class="text-center">${row.warehouse_name || row.warehouse_code}</td>
                    <td class="text-center">${row.remarks || ''}</td>
                    <td class="text-center">${row.createuser || ''}</td>
                    <td class="text-center">${row.createdate || ''}</td>
                    <td class="text-center">
                        <span class="${row.status === 'Y' ? 'status-applied' : ''}">${row.status === 'Y' ? '반영' : '미반영'}</span>
                    </td>
                    <td class="text-center">
                        <button class="btn btn-info btn-sm me-1" onclick="viewDetail(${row.id})">상세보기</button>
                        <button class="btn btn-warning btn-sm me-1" onclick="editAudit(${row.id})">수정</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            renderPagination(totalCount);
        })
        .catch(error => {
            console.error('목록 조회 오류:', error);
            alert('목록 조회 중 오류가 발생했습니다.');
        });
}

function renderPagination(totalCount) {
    const totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
    const paginationDiv = document.getElementById('pagination');
    if (!paginationDiv) return;
    
    let html = '';
    html += `<button class='btn btn-outline-secondary btn-sm' ${currentPage === 1 ? 'disabled' : ''} onclick='gotoPage(${currentPage - 1})'>이전</button> `;
    html += `<span class='mx-2'>${currentPage} / ${totalPages}</span>`;
    html += `<button class='btn btn-outline-secondary btn-sm' ${currentPage === totalPages ? 'disabled' : ''} onclick='gotoPage(${currentPage + 1})'>다음</button>`;
    paginationDiv.innerHTML = html;
}

function gotoPage(page) {
    currentPage = page;
    loadAuditList();
}

function viewDetail(auditId) {
    window.location.href = `/inventory/inventory_audit_detail?id=${auditId}`;
}

function editAudit(auditId) {
    window.location.href = `/inventory/inventory_audit_edit?id=${auditId}`;
}

function loadAuditDetail(auditId) {
    // 실사 기본 정보 로드
    fetch(`/api/inventory/audit/detail/${auditId}`)
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                const data = result.data;
                displayAuditInfo(data);
                loadAuditItems(auditId);
            } else {
                alert('실사 정보를 불러오는데 실패했습니다: ' + (result.message || '알 수 없는 오류'));
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('실사 정보를 불러오는 중 오류가 발생했습니다.');
        });
}

function displayAuditInfo(data) {
    document.getElementById('auditId').textContent = data.id || '';
    document.getElementById('auditDate').textContent = data.audit_date || '';
    document.getElementById('warehouseName').textContent = data.warehouse_name || data.warehouse_code || '';
    document.getElementById('status').textContent = data.status === 'Y' ? '반영완료' : '미반영';
    document.getElementById('remarks').textContent = data.remarks || '';
    document.getElementById('createUser').textContent = data.createuser || '';
    document.getElementById('createDate').textContent = data.createdate || '';
}

function loadAuditItems(auditId) {
    fetch(`/api/inventory/audit/items/${auditId}`)
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                const data = result.data || [];
                displayAuditItems(data);
                calculateSummary(data);
            } else {
                alert('실사 항목을 불러오는데 실패했습니다: ' + (result.message || '알 수 없는 오류'));
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('실사 항목을 불러오는 중 오류가 발생했습니다.');
        });
}

function displayAuditItems(data) {
    const tbody = document.getElementById('auditDetailBody');
    tbody.innerHTML = '';
    
    data.forEach((item, index) => {
        const difference = (item.audit_qty || 0) - (item.system_qty || 0);
        const differenceClass = difference === 0 ? 'text-success' : 'text-danger';
        const differenceText = difference > 0 ? `+${difference.toLocaleString()}` : difference.toLocaleString();
        const systemQtyText = (item.system_qty || 0).toLocaleString();
        const auditQtyText = (item.audit_qty || 0).toLocaleString();
        
        const price = item.purchase_price || item.sales_price || 0;
        const stockValue = (item.audit_qty || 0) * price;
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="text-center">${index + 1}</td>
            <td class="text-center">${item.item_code || ''}</td>
            <td class="text-center">${item.item_name || ''}</td>
            <td class="text-center">${item.spec || ''}</td>
            <td class="text-center">${item.unit || ''}</td>
            <td class="text-center">${item.purchase_price ? item.purchase_price.toLocaleString() : '-'}</td>
            <td class="text-center">${item.sales_price ? item.sales_price.toLocaleString() : '-'}</td>
            <td class="text-center">
                <span class="badge ${item.usage === 'Y' ? 'bg-success' : 'bg-secondary'}">${item.usage === 'Y' ? '사용' : '미사용'}</span>
            </td>
            <td class="text-center">${systemQtyText}</td>
            <td class="text-center">${auditQtyText}</td>
            <td class="text-center ${differenceClass} fw-bold">${differenceText}</td>
            <td class="text-center">${stockValue.toLocaleString()}</td>
            <td class="text-center">${item.remarks || ''}</td>
        `;
        tbody.appendChild(tr);
    });
}

function calculateSummary(data) {
    const totalItems = data.length;
    const matchedItems = data.filter(item => 
        (item.audit_qty || 0) === (item.system_qty || 0)
    ).length;
    const differentItems = totalItems - matchedItems;
    const totalDifference = data.reduce((sum, item) => 
        sum + Math.abs((item.audit_qty || 0) - (item.system_qty || 0)), 0
    );
    
    // 과잉재고 품목 (실사수량 > 시스템수량)
    const overStockItems = data.filter(item => 
        (item.audit_qty || 0) > (item.system_qty || 0)
    ).length;
    
    // 부족재고 품목 (실사수량 < 시스템수량)
    const shortageItems = data.filter(item => 
        (item.audit_qty || 0) < (item.system_qty || 0)
    ).length;
    
    // 정확도 계산 (일치 품목 / 총 품목 * 100)
    const accuracyRate = totalItems > 0 ? Math.round((matchedItems / totalItems) * 100) : 0;
    
    // 총 재고가치 (실사수량 * 매입단가 기준으로 계산)
    const totalValue = data.reduce((sum, item) => {
        const qty = item.audit_qty || 0;
        const price = item.purchase_price || item.sales_price || 0;
        return sum + (qty * price);
    }, 0);
    
    document.getElementById('totalItems').textContent = totalItems.toLocaleString();
    document.getElementById('matchedItems').textContent = matchedItems.toLocaleString();
    document.getElementById('differentItems').textContent = differentItems.toLocaleString();
    document.getElementById('totalDifference').textContent = totalDifference.toLocaleString();
    document.getElementById('overStockItems').textContent = overStockItems.toLocaleString();
    document.getElementById('shortageItems').textContent = shortageItems.toLocaleString();
    document.getElementById('accuracyRate').textContent = accuracyRate.toLocaleString() + '%';
    document.getElementById('totalValue').textContent = totalValue.toLocaleString();
}
</script>

<style>
.form-control-plaintext {
    padding: 0.375rem 0.75rem;
    margin-bottom: 0;
    color: #495057;
    background-color: #f8f9fa;
    border: 1px solid #dee2e6;
    border-radius: 0.375rem;
}

.card-header {
    border-bottom: none;
    font-weight: 600;
}

.table th {
    font-weight: 600;
    background-color: #d1ecf1;
}

.table td {
    vertical-align: middle;
}

.border.rounded {
    transition: transform 0.2s ease;
}

.border.rounded:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.status-applied {
    color: #1976d2;
    font-weight: bold;
}

.table-responsive {
    max-height: 600px;
    overflow-y: auto;
}

.table th {
    position: sticky;
    top: 0;
    z-index: 10;
    background-color: #d1ecf1 !important;
}

.table td {
    font-size: 0.9rem;
}

.table td.text-success {
    font-weight: bold;
}

.table td.text-danger {
    font-weight: bold;
}

/* 스크롤바 스타일링 */
.table-responsive::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

.table-responsive::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 4px;
}

.table-responsive::-webkit-scrollbar-thumb {
    background: #c1c1c1;
    border-radius: 4px;
}

.table-responsive::-webkit-scrollbar-thumb:hover {
    background: #a8a8a8;
}
</style>
{% endblock %}
