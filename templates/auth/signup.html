<!DOCTYPE html>
<html lang="{{ session.get('language', 'th') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ get_text('signup') }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
            min-height: 100vh;
        }
        .signup-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px 30px 30px 30px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            position: relative;
        }
        .signup-container .icon {
            font-size: 48px;
            color: #43cea2;
            display: block;
            text-align: center;
            margin-bottom: 10px;
        }
        .signup-container h2 {
            text-align: center;
            margin-bottom: 24px;
            font-weight: 700;
            color: #222;
        }
        .form-group label {
            font-weight: 500;
            color: #333;
        }
        .form-control {
            border-radius: 8px;
            font-size: 15px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #43cea2 0%, #185a9d 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #185a9d 0%, #43cea2 100%);
        }
        .alert {
            font-size: 14px;
        }
        .signup-footer {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
        }
        .signup-footer a {
            color: #185a9d;
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .signup-container {
                padding: 25px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="signup-container">
            <span class="icon"><i class="fa-solid fa-user-plus"></i></span>
            <h2>{{ get_text('signup') }}</h2>
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger">{{ get_text(message) if message.startswith('auth_') else message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST" action="{{ url_for('auth.signup') }}">
                <div class="form-group mb-3">
                    <label for="username"><i class="fa-solid fa-user"></i> {{ get_text('username') }}</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus
                           placeholder="{{ get_text('enter_username') }}">
                </div>
                <div class="form-group mb-3">
                    <label for="email"><i class="fa-solid fa-envelope"></i> {{ get_text('email') }}</label>
                    <input type="email" class="form-control" id="email" name="email" required
                           placeholder="{{ get_text('enter_email') }}">
                </div>
                <div class="form-group mb-3">
                    <label for="password"><i class="fa-solid fa-lock"></i> {{ get_text('password') }}</label>
                    <input type="password" class="form-control" id="password" name="password" required
                           placeholder="{{ get_text('enter_password') }}">
                </div>
                <div class="form-group mb-3">
                    <label for="confirm_password"><i class="fa-solid fa-lock"></i> {{ get_text('confirm_password') }}</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required
                           placeholder="{{ get_text('enter_confirm_password') }}">
                </div>
                <div class="form-group mb-3">
                    <label for="full_name"><i class="fa-solid fa-id-card"></i> {{ get_text('full_name') }}</label>
                    <input type="text" class="form-control" id="full_name" name="full_name"
                           placeholder="{{ get_text('full_name') }}">
                </div>
                <div class="form-group mb-3">
                    <label for="phone_number"><i class="fa-solid fa-phone"></i> {{ get_text('phone') }}</label>
                    <input type="tel" class="form-control" id="phone_number" name="phone_number"
                           placeholder="{{ get_text('phone') }}">
                </div>
                <button type="submit" class="btn btn-primary w-100">{{ get_text('signup_submit') }}</button>
            </form>
            <div class="signup-footer">
                {{ get_text('auth_have_account') }}
                <a href="{{ url_for('auth.login') }}">{{ get_text('auth_login_link') }}</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
