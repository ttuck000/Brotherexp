<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
        }

        /* 배너와 로그인 박스를 동일한 너비(150% -> 600px)로 설정 */
        .login-banner {
            width: 600px;
            max-width: none;
            margin: 40px auto 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

            .login-banner img {
                display: block;
                width: 100%;
                height: auto;
            }

        .login-container {
            width: 600px;
            max-width: none;
            margin: 20px auto;
            padding: 40px 30px 30px 30px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            position: relative;
        }

            .login-container .icon {
                font-size: 48px;
                color: #2575fc;
                display: block;
                text-align: center;
                margin-bottom: 10px;
            }

            .login-container h2 {
                text-align: center;
                margin-bottom: 24px;
                font-weight: 700;
                color: #222;
            }

        .form-group label {
            font-weight: 500;
            color: #333;
        }

        .form-control {
            border-radius: 8px;
            font-size: 15px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 10px;
        }

            .btn-primary:hover {
                background: linear-gradient(90deg, #2575fc 0%, #6a11cb 100%);
            }

        .alert {
            font-size: 14px;
        }

        .login-footer {
            text-align: center;
            margin-top: 18px;
            font-size: 14px;
        }

            .login-footer a {
                color: #2575fc;
                text-decoration: underline;
            }

        /* 모바일 대응: 화면 폭을 넘지 않도록 100%로 축소 */
        @media (max-width: 700px) {
            .login-container {
                width: 100%;
                padding: 25px 12px;
            }

            .login-banner {
                width: 100%;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-banner">
            <img src="{{ url_for('static', filename='images/brother_banner.jpg') }}" alt="Brother banner">
        </div>

        <div class="login-container">
            <span class="icon"><i class="fa-solid fa-user-circle"></i></span>
            <h2>로그인</h2>
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group mb-3">
                    <label for="username"><i class="fa-solid fa-user"></i> 아이디</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                </div>
                <div class="form-group mb-3">
                    <label for="password"><i class="fa-solid fa-lock"></i> 비밀번호</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">로그인</button>
            </form>
            <div class="login-footer">
                계정이 없으신가요? <a href="{{ url_for('auth.signup') }}">회원가입</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
