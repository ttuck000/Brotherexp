<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ get_text('item_code_edit') }} - MES 시스템</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/product_code.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
.content-area {
    max-width: 1200px;
    margin: 20px auto;
    padding: 20px;
    background-color: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    border-radius: 4px;
}

        .form-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #0d6efd;
            border-bottom: 2px solid #0d6efd;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group label.required::after {
            content: " *";
            color: #dc3545;
            margin-left: 4px;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            transition: border-color 0.2s ease-in-out;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="number"]:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #86b7fe;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            min-width: 80px;
        }

        .btn-primary {
            background-color: #0d6efd;
            color: white;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .readonly-field {
            background-color: #e9ecef;
            cursor: not-allowed;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-col {
            flex: 1;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .page-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0d6efd;
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        {% include 'nav.html' %}
    </nav>

    <main class="content-area">
        <div class="form-container">
            <div class="page-title">{{ get_text('item_code_edit') }}</div>
            <form id="editForm">
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="itemCode" class="required">{{ get_text('item_code') }}</label>
                            <input type="text" id="itemCode" name="code" class="readonly-field" readonly>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="itemName" class="required">{{ get_text('item_name') }}</label>
                            <input type="text" id="itemName" name="name" maxlength="50" required>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="spec">{{ get_text('specification') }}</label>
                            <input type="text" id="spec" name="spec" maxlength="100">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="unit">{{ get_text('unit') }}</label>
                            <select id="unit" name="unit" class="form-control">
                                <option value="">{{ get_text('select') }}</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="purchasePrice">{{ get_text('purchase_price') }}</label>
                            <input type="number" id="purchasePrice" name="purchasePrice" min="0" step="0.01">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="salesPrice">{{ get_text('sales_price') }}</label>
                            <input type="number" id="salesPrice" name="salesPrice" min="0" step="0.01">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="usage">{{ get_text('usage') }}</label>
                            <select id="usage" name="usage">
                                <option value="Y">{{ get_text('use') }}</option>
                                <option value="N">{{ get_text('not_use') }}</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <!-- 빈 공간을 위한 더미 div -->
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="remarks">{{ get_text('remark') }}</label>
                            <textarea id="remarks" name="remarks" maxlength="200" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="form-col">
                        <!-- 빈 공간을 위한 더미 div -->
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">{{ get_text('save') }}</button>
                    <button type="button" class="btn btn-secondary" onclick="history.back()">{{ get_text('cancel') }}</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 MES 시스템. All rights reserved.</p>
    </footer>

    <script>
        // 서버에서 전달받은 데이터를 JavaScript 변수로 설정
        const itemData = JSON.parse('{{ item | tojson | safe }}');
        
        document.addEventListener('DOMContentLoaded', function() {
            // 단위 정보 로드 후 폼에 데이터 설정
            loadUnitOptions().then(() => {
                setFormData(itemData);
            });

            document.getElementById('editForm').addEventListener('submit', function(e) {
                e.preventDefault();
                updateItem();
            });
        });

        // 단위 정보 로드 함수
        async function loadUnitOptions() {
            try {
                const response = await fetch('/unit/options');
                const data = await response.json();
                const unitSelect = document.getElementById('unit');
                
                data.forEach(unit => {
                    const option = document.createElement('option');
                    option.value = unit.code;
                    option.textContent = `${unit.code} - ${unit.name}`;
                    unitSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading unit options:', error);
            }
        }

        // 폼에 데이터 설정
        function setFormData(data) {
            document.getElementById('itemCode').value = data.code || '';
            document.getElementById('itemName').value = data.name || '';
            document.getElementById('spec').value = data.spec || '';
            document.getElementById('unit').value = data.unit || '';
            document.getElementById('purchasePrice').value = data.purchasePrice || 0;
            document.getElementById('salesPrice').value = data.salesPrice || 0;
            document.getElementById('remarks').value = data.remarks || '';

            const usageSelect = document.getElementById('usage');
            if (data.usage === 'Y' || data.usage === 'N') {
                usageSelect.value = data.usage;
            } else {
                usageSelect.value = 'Y';
            }
        }

        function updateItem() {
            const formData = {
                code: document.getElementById('itemCode').value,
                name: document.getElementById('itemName').value,
                spec: document.getElementById('spec').value,
                unit: document.getElementById('unit').value,
                purchasePrice: parseFloat(document.getElementById('purchasePrice').value) || 0,
                salesPrice: parseFloat(document.getElementById('salesPrice').value) || 0,
                usage: document.getElementById('usage').value,
                remarks: document.getElementById('remarks').value
            };

            fetch('/item/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert("품목이 성공적으로 수정되었습니다.");
                    window.location.href = '/item_code';
                } else {
                    alert(data.error || "품목 수정에 실패했습니다.");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("품목 수정에 실패했습니다.");
            });
        }
    </script>

    <script>
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('mouseover', function() {
                this.querySelector('.submenu').style.display = 'block';
            });     
            
            item.addEventListener('mouseout', function() {
                this.querySelector('.submenu').style.display = 'none';
            });
        });
    </script>
</body>
</html>
