<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ get_text('warehouse_edit') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/product_code.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .content-area {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        .form-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #0d6efd;
            border-bottom: 2px solid #0d6efd;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group label.required::after {
            content: " *";
            color: #dc3545;
            margin-left: 4px;
        }

        .form-group input[type="text"],
        .form-group input[type="tel"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            transition: border-color 0.2s ease-in-out;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="tel"]:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #86b7fe;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            min-width: 80px;
        }

        .btn-primary {
            background-color: #0d6efd;
            color: white;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .readonly-field {
            background-color: #e9ecef;
            cursor: not-allowed;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-col {
            flex: 1;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .page-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0d6efd;
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        {% include 'nav.html' %}
    </nav>

    <main class="content-area">
        <div class="form-container">
            <div class="page-title">{{ get_text('warehouse_edit') }}</div>
            <form id="editForm" method="POST">
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="warehouseCode" class="required">{{ get_text('warehouse_code') }}</label>
                            <input type="text" id="warehouseCode" name="warehouse_code" class="readonly-field" value="{{ warehouse.WH_CODE }}" readonly>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="warehouseName" class="required">{{ get_text('warehouse_name') }}</label>
                            <input type="text" id="warehouseName" name="warehouse_name" maxlength="50" value="{{ warehouse.WH_NAME }}" required>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="location">{{ get_text('location') }}</label>
                            <input type="text" id="location" name="location" maxlength="100" value="{{ warehouse.WH_LOCATION }}">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="manager">{{ get_text('manager') }}</label>
                            <input type="text" id="manager" name="manager" maxlength="50" value="{{ warehouse.WH_MANAGER }}">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="phone">{{ get_text('phone') }}</label>
                            <input type="tel" id="phone" name="phone" maxlength="20" value="{{ warehouse.WH_PHONE }}">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="usage">{{ get_text('usage') }}</label>
                            <select id="usage" name="usage">
                                <option value="Y" {% if warehouse.usage == 'Y' %}selected{% endif %}>{{ get_text('use') }}</option>
                                <option value="N" {% if warehouse.usage == 'N' %}selected{% endif %}>{{ get_text('not_use') }}</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="remarks">{{ get_text('remarks') }}</label>
                            <textarea id="remarks" name="remarks" maxlength="200">{{ warehouse.remarks }}</textarea>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">{{ get_text('save') }}</button>
                    <button type="button" class="btn btn-secondary" onclick="history.back()">{{ get_text('cancel') }}</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('editForm');
            
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 필수 필드 검증
                const warehouseName = document.getElementById('warehouseName').value.trim();
                
                if (!warehouseName) {
                    alert('{{ get_text("please_enter_warehouse_name") }}');
                    document.getElementById('warehouseName').focus();
                    return;
                }

                this.submit();
            });
        });
    </script>
</body>
</html>
