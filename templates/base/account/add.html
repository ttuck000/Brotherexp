<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ get_text('account_management') }} - MES 시스템</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/product_code.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .content-area {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        .form-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #0d6efd;
            border-bottom: 2px solid #0d6efd;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

            .form-group label {
                display: block;
                margin-bottom: 8px;
                font-weight: 500;
                color: #333;
                font-size: 14px;
            }

                .form-group label.required::after {
                    content: " *";
                    color: #dc3545;
                    margin-left: 4px;
                }

            .form-group input[type="text"], .form-group input[type="tel"], .form-group select, .form-group textarea {
                width: 100%;
                padding: 8px 12px;
                border: 1px solid #ced4da;
                border-radius: 4px;
                font-size: 14px;
                line-height: 1.5;
                transition: border-color 0.2s ease-in-out;
            }

                .form-group input[type="text"]:focus, .form-group input[type="tel"]:focus, .form-group select:focus, .form-group textarea:focus {
                    border-color: #86b7fe;
                    outline: 0;
                    box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
                }

        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            min-width: 80px;
        }

        .btn-primary {
            background-color: #0d6efd;
            color: white;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-col {
            flex: 1;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .page-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0d6efd;
        }

        .check-result {
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

            .check-result.success {
                color: #198754;
                display: block;
            }

            .check-result.error {
                color: #dc3545;
                display: block;
            }

        .checking {
            color: #6c757d;
            display: block;
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        {% include 'nav.html' %}
    </nav>

    <main class="content-area">
        <div class="form-container">
            <div class="page-title">{{ get_text('add_account') }}</div>
            <form id="newForm" method="POST" action="{{ url_for('base.account_add') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="accountCode" class="required">{{ get_text('account_code') }}</label>
                            <input type="text" id="accountCode" name="account_code" maxlength="20" required placeholder="{{ get_text('enter_account_code') }}">
                            <div id="codeCheckResult" class="check-result"></div>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="accountName" class="required">{{ get_text('account_name') }}</label>
                            <input type="text" id="accountName" name="account_name" maxlength="50" required placeholder="{{ get_text('enter_account_name') }}">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="location">{{ get_text('location') }}</label>
                            <input type="text" id="location" name="location" maxlength="100">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="manager">{{ get_text('manager') }}</label>
                            <input type="text" id="manager" name="manager" maxlength="50">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="phone">{{ get_text('phone') }}</label>
                            <input type="tel" id="phone" name="phone" maxlength="20">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="usage">{{ get_text('usage') }}</label>
                            <select id="usage" name="usage">
                                <option value="Y">{{ get_text('use') }}</option>
                                <option value="N">{{ get_text('not_use') }}</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="remarks">{{ get_text('remarks') }}</label>
                            <textarea id="remarks" name="remarks" maxlength="200"></textarea>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">{{ get_text('save') }}</button>
                    <a href="{{ url_for('base.account_list') }}" class="btn btn-secondary">{{ get_text('cancel') }}</a>
                </div>
            </form>
        </div>
    </main>

<script>
        let isCodeValid = false;

        document.addEventListener('DOMContentLoaded', function() {
            const accountCodeInput = document.getElementById('accountCode');
            const codeCheckResult = document.getElementById('codeCheckResult');
            const form = document.getElementById('newForm');

            // 창고코드 입력 필드에서 포커스가 벗어날 때 중복 체크
            accountCodeInput.addEventListener('blur', function() {
                const code = this.value.trim();
                if (code) {
                    checkaccountCode(code);
                } else {
                    codeCheckResult.className = 'check-result error';
                    codeCheckResult.textContent = '{{ get_text("please_enter_code") }}';
                    isCodeValid = false;
                }
            });

            // 폼 제출 처리
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                // 필수 필드 검증
                const accountName = document.getElementById('accountName').value.trim();

                if (!accountCodeInput.value.trim()) {
                    alert('{{ get_text("please_enter_account_code") }}');
                    accountCodeInput.focus();
                    return;
                }

                if (!accountName) {
                    alert('{{ get_text("please_enter_account_name") }}');
                    document.getElementById('accountName').focus();
                    return;
                }

                if (!isCodeValid) {
                    alert('{{ get_text("please_check_account_code") }}');
                    accountCodeInput.focus();
                    return;
                }

                this.submit();
            });
        });

        // 계정코드 중복 체크 함수
        function checkaccountCode(code) {
            codeCheckResult.className = 'check-result checking';
            codeCheckResult.textContent = '{{ get_text("checking") }}';

            fetch('/check_account_code/' + code)
                .then(response => response.json())
                .then(data => {
                    if (data.available) {
                        codeCheckResult.className = 'check-result success';
                        codeCheckResult.textContent = '{{ get_text("code_available") }}';
                        isCodeValid = true;
                    } else {
                        codeCheckResult.className = 'check-result error';
                        codeCheckResult.textContent = '{{ get_text("code_already_exists") }}';
                        isCodeValid = false;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    codeCheckResult.className = 'check-result error';
                    codeCheckResult.textContent = '{{ get_text("check_failed") }}';
                    isCodeValid = false;
                });
        }
</script>
</body>
</html>
