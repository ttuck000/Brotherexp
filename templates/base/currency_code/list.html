<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ get_text('currency_code_management') }} - MES 시스템</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/product_code.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
   

        .form-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 22px;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid #007bff;
            color: #2c3e50;
        }

        .search-section {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        .search-form {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 0;
            flex: 0 0 auto;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
            font-size: 13px;
        }

        .form-group input {
            padding: 6px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 13px;
            width: 200px;
        }

        #currencyCode {
            width: 150px;
        }

        #currencyName {
            width: 200px;
        }

        .button-section {
            margin: 20px 0;
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            min-width: 80px;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
        }

        .btn-edit {
            background-color: #007bff;
            color: white;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-add:hover {
            background-color: #218838;
        }

        .btn-edit:hover {
            background-color: #0056b3;
        }

        .btn-delete:hover {
            background-color: #c82333;
        }

        .search-btn {
            height: 33px;
            margin-bottom: 0;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        .search-btn:hover {
            background-color: #0056b3;
        }

        .currency-grid {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .currency-grid th,
        .currency-grid td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
            font-size: 13px;
        }

        .currency-grid th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #495057;
        }

        .currency-grid tr:hover {
            background-color: #f8f9fa;
        }

        .currency-grid input[type="checkbox"] {
            margin: 0;
        }
    </style>
</head>
<body>
        {% include 'nav.html' %}

    <main class="content-area">
        <div class="form-container">
            <h2>{{ get_text('currency_code_management') }}</h2>
            
            <!-- 검색 영역 -->
            <div class="search-section">
                <form id="searchForm" class="search-form">
                    <div class="form-group">
                        <label for="currencyCode">{{ get_text('currency_code') }}</label>
                        <input type="text" id="currencyCode" name="currencyCode" placeholder="{{ get_text('enter_currency_code') }}">
                    </div>
                    <div class="form-group">
                        <label for="currencyName">{{ get_text('currency_name') }}</label>
                        <input type="text" id="currencyName" name="currencyName" placeholder="{{ get_text('enter_currency_name') }}">
                    </div>
                    <button type="submit" class="search-btn">{{ get_text('search') }}</button>
                </form>
            </div>

            <!-- 버튼 영역 -->
            <div class="button-section">
                <button id="newCurrency" class="btn btn-add">{{ get_text('new') }}</button>
                <button id="editCurrency" class="btn btn-edit">{{ get_text('edit') }}</button>
                <button id="deleteCurrency" class="btn btn-delete">{{ get_text('delete') }}</button>
            </div>

            <!-- 그리드 영역 -->
            <div class="grid-section">
                <table class="currency-grid">
                    <thead>
                        <tr>
                            <th width="50">{{ get_text('select') }}</th>
                            <th width="150">{{ get_text('currency_code') }}</th>
                            <th width="200">{{ get_text('currency_name') }}</th>
                            <th width="150">{{ get_text('exchange_rate') }}</th>
                            <th width="100">{{ get_text('base_currency') }}</th>
                            <th width="100">{{ get_text('usage') }}</th>
                        </tr>
                    </thead>
                    <tbody id="currencyTableBody">
                        <!-- 데이터는 JavaScript로 동적 추가 -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 MES 시스템. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 초기 데이터 로드
            loadCurrencies();
            
            // 검색 폼 제출 이벤트
            document.getElementById('searchForm').addEventListener('submit', function(e) {
                e.preventDefault();
                searchCurrencies();
            });

            // 신규 버튼 클릭 이벤트
            document.getElementById('newCurrency').addEventListener('click', function() {
                window.location.href = '/currency_code/new';
            });

            // 수정 버튼 클릭 이벤트
            document.getElementById('editCurrency').addEventListener('click', function() {
                const selectedRow = document.querySelector('input[type="checkbox"]:checked');
                if (selectedRow) {
                    const code = selectedRow.closest('tr').querySelector('td:nth-child(2)').textContent;
                    window.location.href = `/currency_code/edit/${code}`;
                } else {
                    alert("{{ get_text('select_currency_to_edit') }}");
                }
            });

            // 삭제 버튼 클릭 이벤트
            document.getElementById('deleteCurrency').addEventListener('click', function() {
                const selectedCheckboxes = document.querySelectorAll('input[type="checkbox"]:checked');
                if (selectedCheckboxes.length === 0) {
                    alert("{{ get_text('select_currency_to_delete') }}");
                    return;
                }

                if (confirm("{{ get_text('delete_confirm') }}")) {
                    const codes = Array.from(selectedCheckboxes).map(checkbox => 
                        checkbox.closest('tr').querySelector('td:nth-child(2)').textContent
                    );
                    
                    deleteCurrencies(codes);
                }
            });
        });

        // 통화 목록 로드
        function loadCurrencies() {
            fetch('/currency/list')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('currencyTableBody');
                    tbody.innerHTML = '';
                    
                    data.forEach(currency => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><input type="checkbox"></td>
                            <td>${currency.code}</td>
                            <td>${currency.name}</td>
                            <td>${currency.exchangeRate || ''}</td>
                            <td>${currency.baseYn || 'N'}</td>
                            <td>${currency.usage || 'Y'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("{{ get_text('currency_load_failed') }}");
                });
        }

        // 통화 검색
        function searchCurrencies() {
            const code = document.getElementById('currencyCode').value;
            const name = document.getElementById('currencyName').value;
            
            fetch(`/currency/search?code=${encodeURIComponent(code)}&name=${encodeURIComponent(name)}`)
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('currencyTableBody');
                    tbody.innerHTML = '';
                    
                    data.forEach(currency => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><input type="checkbox"></td>
                            <td>${currency.code}</td>
                            <td>${currency.name}</td>
                            <td>${currency.exchangeRate || ''}</td>
                            <td>${currency.baseYn || 'N'}</td>
                            <td>${currency.usage || 'Y'}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert("{{ get_text('search_failed') }}");
                });
        }

        // 통화 삭제
        function deleteCurrencies(codes) {
            fetch('/currency/delete', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ codes: codes })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert("{{ get_text('delete_success') }}");
                    loadCurrencies();
                } else {
                    alert(data.error || "{{ get_text('delete_failed') }}");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("{{ get_text('delete_failed') }}");
            });
        }
    </script>

    <script>
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('mouseover', function() {
                this.querySelector('.submenu').style.display = 'block';
            });
            
            item.addEventListener('mouseout', function() {
                this.querySelector('.submenu').style.display = 'none';
            });
        });
    </script>
</body>
</html>
