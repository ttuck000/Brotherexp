<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>품목코드 등록 - MES 시스템</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/product_code.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
.content-area {
    max-width: 1200px;
    margin: 20px auto;
    padding: 20px;
    background-color: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    border-radius: 4px;
}

        .form-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 24px;
            margin-bottom: 30px;
            color: #0d6efd;
            border-bottom: 2px solid #0d6efd;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group label.required::after {
            content: " *";
            color: #dc3545;
            margin-left: 4px;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
            transition: border-color 0.2s ease-in-out;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="number"]:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #86b7fe;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            min-width: 80px;
        }

        .btn-primary {
            background-color: #0d6efd;
            color: white;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-col {
            flex: 1;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .page-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0d6efd;
        }

        /* 중복 체크 결과 메시지 스타일 */
        .check-result {
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .check-result.success {
            color: #198754;
            display: block;
        }

        .check-result.error {
            color: #dc3545;
            display: block;
        }

        /* 중복 체크 로딩 표시 */
        .checking {
            color: #6c757d;
            display: block;
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        {% include 'nav.html' %}
    </nav>

    <main class="content-area">
        <div class="form-container">
            <div class="page-title">{{ get_text('item_code_new') }}</div>
            <form id="newForm">
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="itemCode" class="required">{{ get_text('item_code') }}</label>
                            <input type="text" id="itemCode" name="code" maxlength="20" required placeholder="{{ get_text('enter_item_code') }}">
                            <div id="codeCheckResult" class="check-result"></div>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="itemName" class="required">{{ get_text('item_name') }}</label>
                            <input type="text" id="itemName" name="name" maxlength="50" required placeholder="{{ get_text('enter_item_name') }}">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="spec">{{ get_text('specification') }}</label>
                            <input type="text" id="spec" name="spec" maxlength="100">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="unit">{{ get_text('unit') }}</label>
                            <select id="unit" name="unit" class="form-control">
                                <option value="">{{ get_text('select') }}</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="purchasePrice">{{ get_text('purchase_price') }}</label>
                            <input type="number" id="purchasePrice" name="purchasePrice" min="0" step="0.01">
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="salesPrice">{{ get_text('sales_price') }}</label>
                            <input type="number" id="salesPrice" name="salesPrice" min="0" step="0.01">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="usage">{{ get_text('usage') }}</label>
                            <select id="usage" name="usage">
                                <option value="Y">{{ get_text('use') }}</option>
                                <option value="N">{{ get_text('not_use') }}</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-col">
                        <!-- 빈 공간을 위한 더미 div -->
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">{{ get_text('save') }}</button>
                    <button type="button" class="btn btn-secondary" onclick="history.back()">{{ get_text('cancel') }}</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 MES 시스템. All rights reserved.</p>
    </footer>

    <script>
        let isCodeValid = false;

        document.addEventListener('DOMContentLoaded', function() {
            const itemCodeInput = document.getElementById('itemCode');
            const codeCheckResult = document.getElementById('codeCheckResult');

            // 단위 정보 로드
            loadUnitOptions();

            // 품목코드 입력 필드에서 포커스가 벗어날 때 중복 체크
            itemCodeInput.addEventListener('blur', function() {
                const code = this.value.trim();
                if (code) {
                    checkDuplicateCode(code);
                } else {
                    codeCheckResult.textContent = '';
                    codeCheckResult.className = 'check-result';
                    isCodeValid = false;
                }
            });

            // 폼 제출 이벤트
            document.getElementById('newForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // 품목코드 최종 중복 체크
                const code = itemCodeInput.value.trim();
                if (!code) {
                    alert("품목코드를 입력하세요.");
                    itemCodeInput.focus();
                    return;
                }

                try {
                    const isDuplicate = await checkDuplicateCodeAsync(code);
                    if (isDuplicate) {
                        alert("이미 존재하는 품목코드입니다.");
                        itemCodeInput.focus();
                        return;
                    }
                    // 중복이 아닌 경우 저장 진행
                    saveItem();
                } catch (error) {
                    console.error('Error:', error);
                    alert("중복 확인 중 오류가 발생했습니다.");
                }
            });
        });

        // 단위 정보 로드 함수
        function loadUnitOptions() {
            fetch('/unit/options')
                .then(response => response.json())
                .then(data => {
                    const unitSelect = document.getElementById('unit');
                    data.forEach(unit => {
                        const option = document.createElement('option');
                        option.value = unit.code;
                        option.textContent = `${unit.code} - ${unit.name}`;
                        unitSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Error loading unit options:', error);
                });
        }

        // 중복 체크 함수 (비동기)
        async function checkDuplicateCodeAsync(code) {
            try {
                const response = await fetch(`/item/check-duplicate?code=${encodeURIComponent(code)}`);
                const data = await response.json();
                return data.isDuplicate;
            } catch (error) {
                console.error('Error:', error);
                throw error;
            }
        }

        // 중복 체크 함수 (UI 업데이트 포함)
        function checkDuplicateCode(code) {
            const codeCheckResult = document.getElementById('codeCheckResult');
            
            // 로딩 상태 표시
            codeCheckResult.textContent = '중복 확인 중...';
            codeCheckResult.className = 'check-result checking';

            fetch(`/item/check-duplicate?code=${encodeURIComponent(code)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.isDuplicate) {
                        codeCheckResult.textContent = "이미 존재하는 품목코드입니다.";
                        codeCheckResult.className = 'check-result error';
                        isCodeValid = false;
                    } else {
                        codeCheckResult.textContent = "품목코드 사용 가능";
                        codeCheckResult.className = 'check-result success';
                        isCodeValid = true;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    codeCheckResult.textContent = "중복 확인 중 오류가 발생했습니다.";
                    codeCheckResult.className = 'check-result error';
                    isCodeValid = false;
                });
        }

        function saveItem() {
            const formData = {
                code: document.getElementById('itemCode').value,
                name: document.getElementById('itemName').value,
                spec: document.getElementById('spec').value,
                unit: document.getElementById('unit').value,
                purchasePrice: parseFloat(document.getElementById('purchasePrice').value) || 0,
                salesPrice: parseFloat(document.getElementById('salesPrice').value) || 0,
                usage: document.getElementById('usage').value
            };

            fetch('/item/save', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert("품목이 성공적으로 저장되었습니다.");
                    window.location.href = '/item_code';
                } else {
                    alert(data.error || "품목 저장에 실패했습니다.");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("품목 저장에 실패했습니다.");
            });
        }
    </script>

    <script>
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('mouseover', function() {
                this.querySelector('.submenu').style.display = 'block';
            });
            
            item.addEventListener('mouseout', function() {
                this.querySelector('.submenu').style.display = 'none';
            });
        });
    </script>

</body>
</html>
